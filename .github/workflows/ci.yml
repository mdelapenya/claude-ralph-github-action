name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        run: shellcheck --severity=warning entrypoint.sh scripts/*.sh test/*.sh

      - name: Run unit tests
        run: |
          for test_file in test/unit/test-*.sh; do
            if [[ -f "${test_file}" ]]; then
              bash "${test_file}"
            fi
          done

      - name: Run integration tests
        run: |
          for test_file in test/integration/test-*.sh; do
            if [[ -f "${test_file}" ]]; then
              bash "${test_file}"
            fi
          done

      # Login only on push to main: fork PRs cannot access secrets, and node:22-slim is
      # a public image so no auth is needed to build on PRs.
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t claude-ralph-test .
